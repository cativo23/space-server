services:
  mail:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mail
    hostname: mail
    domainname: ${MAIL_DOMAIN}
    ports:
      - "25:25"      # SMTP
      - "465:465"    # SMTPS (implicit TLS)
      - "587:587"    # Submission (STARTTLS)
      - "993:993"    # IMAPS
      - "995:995"    # POP3S (optional)
      - "143:143"    # IMAP (optional, for testing)
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - mail-logs:/var/log/mail
      - mail-config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
      - ./docker-mailserver/accounts/postfix-accounts.cf:/tmp/docker-mailserver/postfix-accounts.cf:ro
      - ./docker-mailserver/accounts/dovecot-accounts.cf:/tmp/docker-mailserver/dovecot-accounts.cf:ro
      - ${TRAEFIK_ACME_PATH:-/home/cativo23/space-server/traefik/letsencrypt/acme.json}:/etc/letsencrypt/acme.json:ro
    environment:
      # Hostname is set via the top-level `hostname:` + `domainname:` keys above.
      # (Earlier versions of this file used OVERRIDES_HOSTNAME / OVERRIDES_DOMAINNAME,
      # which are not real docker-mailserver variables and were silently ignored.)

      # Security
      - ONE_DIR=1
      - PERMIT_DOCKER=network

      # SSL/TLS configuration for Traefik
      - SSL_TYPE=letsencrypt

      # Spam protection
      - ENABLE_SPAMASSASSIN=1
      - SPAMASSASSIN_SPAM_TO_INBOX=1

      # Dovecot
      - ENABLE_MANAGESIEVE=1

      # Postfix
      - POSTFIX_MESSAGE_SIZE_LIMIT=${POSTFIX_MESSAGE_SIZE_LIMIT:-52428800}

      # Logging
      - LOG_LEVEL=info

      # SMTP relay for outbound mail (Hetzner blocks port 25 outbound).
      # DEFAULT_RELAY_HOST sets postfix's `relayhost` (where mail goes);
      # RELAY_HOST/PORT/USER/PASSWORD populate the matching sasl_passwd
      # entry. All must agree on the host:port. Empty defaults = no relay.
      - DEFAULT_RELAY_HOST=${DEFAULT_RELAY_HOST:-}
      - RELAY_HOST=${RELAY_HOST:-}
      - RELAY_PORT=${RELAY_PORT:-25}
      - RELAY_USER=${RELAY_USER:-}
      - RELAY_PASSWORD=${RELAY_PASSWORD:-}

      # Email accounts (auto-generates postfix-accounts.cf on first start)
      - MAIL_ACCOUNTS=${MAIL_ACCOUNTS}
    networks:
      - web
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "ss -tlnp | grep -qE ':(25|465|587|993)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Roundcube Webmail
  webmail:
    image: roundcube/roundcubemail:latest
    container_name: webmail
    environment:
      # IMAP over STARTTLS, SMTP submission over STARTTLS.
      # docker-mailserver dovecot rejects plaintext LOGIN unless the client
      # is already TLS-wrapped — the internal cert is self-signed, so verify
      # is disabled below.
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://mail
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mail
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SKIN=elastic
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,managesieve
    networks:
      - web
    volumes:
      - webmail-data:/var/roundcube/db
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/www/html/config &&
        echo '<?php
        $$config["plugins"] = [];
        $$config["imap_host"] = "tls://mail:143";
        $$config["smtp_host"] = "tls://mail:587";
        $$config["smtp_port"] = 587;
        $$config["smtp_user"] = "%u";
        $$config["smtp_pass"] = "%p";
        $$config["smtp_auth_type"] = "PLAIN";
        $$config["smtp_use_tls"] = true;
        $$config["smtp_tls_wrapper"] = false;
        $$config["db_dsnw"] = "sqlite:////var/roundcube/db/db.sqlite";
        $$config["skin"] = "elastic";
        $$config["imap_conn_options"]["ssl"]["verify_peer"] = false;
        $$config["imap_conn_options"]["ssl"]["verify_peer_name"] = false;
        $$config["smtp_conn_options"]["ssl"]["verify_peer"] = false;
        $$config["smtp_conn_options"]["ssl"]["verify_peer_name"] = false;
        ' > /var/www/html/config/config.inc.php &&
        exec /docker-entrypoint.sh apache2-foreground
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mail.rule=Host(`mail.${MAIL_DOMAIN}`)"
      - "traefik.http.routers.mail.entrypoints=websecure"
      - "traefik.http.routers.mail.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.mail.middlewares=mail-headers@file"
      - "traefik.http.services.mail.loadbalancer.server.port=80"
    depends_on:
      - mail
    restart: always

networks:
  # The service-side reference stays `web` for backwards-compat with
  # docker-mailserver's PERMIT_DOCKER=network logic, but the actual
  # docker network is `space-server_web` (matches dozzle/, uptime-kuma/,
  # ghost, portfolio — root compose's project-prefixed network).
  web:
    name: space-server_web
    external: true

volumes:
  mail-data:
  mail-state:
  mail-logs:
  mail-config:
  webmail-data:
