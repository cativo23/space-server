services:
  # --- Redis ---
  redis-mailcow:
    image: redis:7-alpine
    container_name: redis-mailcow
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - web
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- MySQL/MariaDB ---
  mysql-mailcow:
    image: mariadb:10.11
    container_name: mysql-mailcow
    restart: always
    command: --innodb-buffer-pool-size=256M --innodb-log-buffer-size=32M --innodb-flush-log-at-trx_commit=2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - web
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # --- Postfix (MTA) ---
  postfix-mailcow:
    image: ghcr.io/mailcow/postfix:latest
    container_name: postfix-mailcow
    restart: always
    environment:
      - TZ=${TZ}
      - DOVECOT_HOST=dovecot-mailcow
      - DOVECOT_PORT=12345
      - REDIS_HOST=redis-mailcow
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql-mailcow
      - MYSQL_PORT=3306
    volumes:
      - vmail-data:/var/vmail
      - postfix-data:/etc/postfix
      - dkim-data:/dkim
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${SMTPS_PORT:-465}:465"
      - "${SUBMISSION_PORT:-587}:587"
    networks:
      - web
    depends_on:
      - mysql-mailcow
      - redis-mailcow
      - dovecot-mailcow

  # --- Dovecot (MDA/IMAP) ---
  dovecot-mailcow:
    image: ghcr.io/mailcow/dovecot:latest
    container_name: dovecot-mailcow
    restart: always
    environment:
      - TZ=${TZ}
      - DOVECOT_MASTER_USER=${DOVECOT_MASTER_USER:-admin}
      - DOVECOT_MASTER_PASS=${DOVECOT_MASTER_PASS}
      - REDIS_HOST=redis-mailcow
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql-mailcow
      - MYSQL_PORT=3306
    volumes:
      - vmail-data:/var/vmail
      - dovecot-data:/etc/dovecot
    ports:
      - "${IMAP_PORT:-143}:143"
      - "${IMAPS_PORT:-993}:993"
      - "${POP3_PORT:-110}:110"
      - "${POP3S_PORT:-995}:995"
      - "${MANAGESIEVE_PORT:-4190}:4190"
    networks:
      - web
    depends_on:
      - mysql-mailcow
      - redis-mailcow

  # --- SOGo (Webmail/Groupware) ---
  sogo-mailcow:
    image: ghcr.io/mailcow/sogo:latest
    container_name: sogo-mailcow
    restart: always
    environment:
      - TZ=${TZ}
      - MYSQL_HOST=mysql-mailcow
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - REDIS_HOST=redis-mailcow
      - REDIS_PORT=6379
    volumes:
      - sogo-data:/sogo
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailcow-webmail.rule=Host(`mail.${MAILCOW_DOMAIN}`)"
      - "traefik.http.routers.mailcow-webmail.entrypoints=websecure"
      - "traefik.http.routers.mailcow-webmail.tls.certresolver=letsencryptresolver"
      - "traefik.http.routers.mailcow-webmail.middlewares=security-headers@file"
      - "traefik.http.services.mailcow-webmail.loadbalancer.server.port=20000"
    depends_on:
      - mysql-mailcow
      - redis-mailcow

  # --- Rspamd (Spam filter) ---
  rspamd-mailcow:
    image: ghcr.io/mailcow/rspamd:latest
    container_name: rspamd-mailcow
    restart: always
    environment:
      - TZ=${TZ}
      - REDIS_HOST=redis-mailcow
      - REDIS_PORT=6379
    volumes:
      - rspamd-data:/var/lib/rspamd
    networks:
      - web
    depends_on:
      - redis-mailcow

  # --- ClamAV (Antivirus) ---
  clamd-mailcow:
    image: ghcr.io/mailcow/clamd:latest
    container_name: clamd-mailcow
    restart: always
    environment:
      - TZ=${TZ}
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - web
    healthcheck:
      test: ["CMD", "clamdscan", "--pingpong"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 180s

networks:
  web:
    external: true

volumes:
  mysql-data:
  redis-data:
  vmail-data:
  postfix-data:
  dovecot-data:
  dkim-data:
  sogo-data:
  rspamd-data:
  clamav-data:
