http:
  middlewares:
    auth:
      basicAuth:
        users:
          - "admin:$$apr1$$.Dm1n6lI$$nirsFCp2m2JCZ.wiHYtqz."
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
    # Security headers for webmail (allows iframes for Roundcube)
    mail-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        forceSTSHeader: true
        frameDeny: false
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        # Relaxed CSP for Roundcube webmail compatibility
        contentSecurityPolicy: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; frame-ancestors *;"
